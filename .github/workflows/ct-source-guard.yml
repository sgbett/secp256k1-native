name: CT source guard

on:
  push:
    branches: [master]
    paths:
      - 'ext/**'
      - 'security/check-ct-mask-guard.sh'
      - '.github/workflows/ct-source-guard.yml'
  pull_request:
    paths:
      - 'ext/**'
      - 'security/check-ct-mask-guard.sh'
      - '.github/workflows/ct-source-guard.yml'
  workflow_dispatch:

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Composite action was tried and reverted: `uses: ./.github/actions/*`
      # requires the repo already checked out, so a composite cannot own its
      # own checkout step. The pin duplication between this file and
      # ct-assembly-invariant.yml stays; Dependabot handles the bumps.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: 'Guard: no raw -(uint32_t) / -(uint64_t) mask construction outside ct_value_barrier_u64'
        run: bash security/check-ct-mask-guard.sh
