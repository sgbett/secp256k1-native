name: CT assembly invariant

on:
  push:
    branches: [master]
    paths:
      - 'ext/**'
      - 'security/Makefile'
      - 'security/check-ct-assembly.rb'
      - '.github/workflows/ct-assembly-invariant.yml'
      - '.github/actions/ct-setup/**'
  pull_request:
    paths:
      - 'ext/**'
      - 'security/Makefile'
      - 'security/check-ct-assembly.rb'
      - '.github/workflows/ct-assembly-invariant.yml'
      - '.github/actions/ct-setup/**'
  workflow_dispatch:

permissions: {}

jobs:
  check:
    name: CT assembly invariant (ladder + jp_add_internal)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout + Ruby setup (SHA-pinned in .github/actions/ct-setup — one
      # place to bump when Dependabot updates checkout or setup-ruby).
      - uses: ./.github/actions/ct-setup
        with:
          ruby-version: '3.4'

      # binutils (objdump) is preinstalled on ubuntu-latest — only fall back
      # to apt-get if a future image drops it. Skips `apt-get update` entirely
      # so a broken upstream repo (e.g. packages.microsoft.com returning an
      # unsigned InRelease, as happened 2026-07-07) can't red the CT gate.
      - name: Ensure objdump available
        run: command -v objdump || sudo apt-get install -y --no-install-recommends binutils

      # Compile via security/Makefile so the CI check and local
      # security/run-checks.sh use exactly the same flag set. See the
      # `jacobian_ct.o` target for the flag rationale (in particular
      # `-fno-stack-protector` — canary artefact, not a CT-relevant flag).
      - name: Compile jacobian.c via security/Makefile
        run: make -C security jacobian_ct.o

      - name: Assert ladder loop body + jp_add_internal branchlessness
        run: ruby security/check-ct-assembly.rb security/jacobian_ct.o
