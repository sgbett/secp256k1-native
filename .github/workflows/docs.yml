name: Documentation

on:
  push:
    branches: [master]
    paths:
      - 'lib/**'
      - 'docs/**'
      - '.yardopts'
      - 'Rakefile'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'docs/**'
      - '.yardopts'
      - 'Rakefile'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601  # v1.315.0
        with:
          ruby-version: '3.4'
          bundler-cache: true
      # Different Gemfile (docs/Gemfile) — do not consolidate with above.
      - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601  # v1.315.0
        with:
          ruby-version: '3.4'
          working-directory: docs
          bundler-cache: true
          cache-version: docs
      - name: Build Jekyll site
        run: bundle exec rake docs:build
      - name: Lint frontmatter
        run: bundle exec rake docs:lint
      - name: Proofread internal links
        run: bundle exec rake docs:proofread
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          path: docs/_site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
